<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <path id="topText" d="M 250,250 m -175,0 a 175,175 0 0,1 350,0"/>
    <path id="bottomText" d="M 250,250 m 175,0 a 175,175 0 0,1 -350,0"/>
    <clipPath id="crescentClip">
      <circle cx="250" cy="240" r="100"/>
    </clipPath>
  </defs>

  <!-- White background circle -->
  <circle cx="250" cy="250" r="248" fill="white"/>

  <!-- Outer border ring -->
  <circle cx="250" cy="250" r="245" fill="none" stroke="#1a1a1a" stroke-width="5"/>

  <!-- Inner border ring (text boundary) -->
  <circle cx="250" cy="250" r="150" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Decorative dots at the sides -->
  <circle cx="75" cy="250" r="4" fill="#1a1a1a"/>
  <circle cx="425" cy="250" r="4" fill="#1a1a1a"/>

  <!-- Circular text - SULTANATE (top arc) -->
  <text font-family="Georgia, 'Times New Roman', Times, serif" font-size="38" font-weight="700" fill="#1a1a1a" letter-spacing="8" text-rendering="geometricPrecision">
    <textPath href="#topText" startOffset="50%" text-anchor="middle">SULTANATE</textPath>
  </text>

  <!-- Circular text - OF AMEXEM (bottom arc) -->
  <text font-family="Georgia, 'Times New Roman', Times, serif" font-size="38" font-weight="700" fill="#1a1a1a" letter-spacing="6" text-rendering="geometricPrecision">
    <textPath href="#bottomText" startOffset="50%" text-anchor="middle">OF AMEXEM</textPath>
  </text>

  <!-- Inner white field -->
  <circle cx="250" cy="250" r="148" fill="white"/>
  <circle cx="250" cy="250" r="148" fill="none" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Red Crescent Moon -->
  <g clip-path="url(#crescentClip)">
    <circle cx="235" cy="235" r="80" fill="#C41E3A"/>
    <circle cx="265" cy="230" r="65" fill="white"/>
  </g>

  <!-- Red Five-Pointed Star (precise geometry) -->
  <path d="
    M 300,190
    L 305.88,208.09
    L 325,208.09
    L 309.56,219.41
    L 315.44,237.5
    L 300,226.18
    L 284.56,237.5
    L 290.44,219.41
    L 275,208.09
    L 294.12,208.09
    Z
  " fill="#C41E3A"/>

  <!-- Arabic Bismillah text -->
  <text
    x="250"
    y="355"
    text-anchor="middle"
    font-family="'Noto Naskh Arabic', 'Scheherazade New', 'Traditional Arabic', 'Amiri', serif"
    font-size="24"
    fill="#1a1a1a"
    text-rendering="optimizeLegibility"
  >بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</text>

  <!-- Thin decorative line under Arabic -->
  <line x1="175" y1="370" x2="325" y2="370" stroke="#C41E3A" stroke-width="1.5" opacity="0.4"/>
</svg>
